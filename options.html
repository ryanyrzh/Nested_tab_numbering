<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    :root {
      color-scheme: light dark;
      --popup-bg: Canvas;
      --popup-text: CanvasText;
      --popup-border: ButtonBorder;
      --popup-highlight: AccentColor;
      --popup-highlight-text: AccentColorText;
    }

    html {
      margin: 0;
      background: var(--popup-bg);
    }

    body {
      margin: 0;
      background: transparent;
      color: var(--popup-text);
      font-family: system-ui, sans-serif;
      padding: 16px;
      width: 300px;
    }

    h3 {
      margin: 0 0 12px;
      font-size: 1.1em;
    }

    label {
      display: block;
      margin-bottom: 10px;
    }

    select,
    input[type="text"],
    input[type="number"] {
      background: transparent;
      color: var(--popup-text);
      border: 1px solid var(--popup-border);
      border-radius: 3px;
      padding: 3px 6px;
    }

    select:focus,
    input[type="text"]:focus,
    input[type="number"]:focus {
      outline: none;
      background: var(--popup-highlight);
      color: var(--popup-highlight-text);
      border-color: var(--popup-highlight);
    }

    button#save {
      background: var(--popup-highlight);
      color: var(--popup-highlight-text);
      border: 1px solid var(--popup-border);
      border-radius: 3px;
      padding: 4px 10px;
      cursor: pointer;
    }

    hr {
      border: none;
      border-top: 1px solid var(--popup-border);
      margin: 12px 0;
    }

    #status {
      margin-top: 8px;
      min-height: 1.2em;
      color: var(--popup-text);
    }
  </style>
</head>
<body>
  <h3>Tree Numbering Settings</h3>

  <label>Top left corner:
    <select id="topLeftDisplay">
      <option value="nested">Nested count</option>
      <option value="flat">Flat count</option>
      <option value="nothing">Nothing</option>
    </select>
  </label>

  <label>Top right corner:
    <select id="topRightDisplay">
      <option value="nested">Nested count</option>
      <option value="flat">Flat count</option>
      <option value="nothing">Nothing</option>
    </select>
  </label>

  <hr>

  <label><input type="checkbox" id="autoTextColor" checked> Automatic text color</label>
  <label id="textColorRow">Text color: <input type="color" id="textColor" value="#ffffff"></label>
  <label>Font size (px): <input type="number" id="fontSize" value="10" min="6" max="24"></label>
  <label>Nesting separator: <input type="text" id="separator" value="." maxlength="1" size="2"></label>
  <label><input type="checkbox" id="boldText"> Bold text</label>

  <button id="save">Save</button>
  <div id="status"></div>

  <script src="options.js"></script>
</body>
</html>
